backend:
  name: github
  repo: bascar835/rincon-freddy
  branch: main 
  auth_type: implicit


publish_mode: simple

media_folder: "assets/img/uploads"
public_folder: "assets/img/uploads"

collections:
  - name: "posts"
    label: "Blog · Artículos"
    files:
      - name: "posts"
        label: "Lista de artículos"
        file: "content/posts.json"
        format: json
        fields:
          - name: posts
            label: "Artículos"
            widget: list
            summary: "{{title}} — {{date}}"
            fields:
              - { name: slug, label: "Slug (URL, sin espacios)", widget: string }
              - { name: title, label: "Título", widget: string }
              - { name: date, label: "Fecha", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { name: author, label: "Autor", widget: string, default: "Rincón de Freddy" }
              - name: category
                label: "Categoría"
                widget: select
                options: ["Desayunos", "Ambiente", "Gastronomía", "Benidorm", "Tapas"]
              - { name: image, label: "Imagen principal (portada del artículo)", widget: image }
              - name: hero_video
                label: "Vídeo destacado (opcional)"
                widget: file
                required: false
                hint: "Si lo rellenas, este vídeo sustituye a la imagen principal en la cabecera del artículo. Sube un .mp4 ligero."
              - name: hero_video_embed_url
                label: "O enlace de reel/vídeo destacado (opcional)"
                widget: string
                required: false
                hint: "Alternativa al vídeo subido: pega la URL de un reel de Instagram, TikTok o YouTube Shorts para que aparezca en la cabecera. Si rellenas esto, no hace falta el campo de vídeo subido."
              - { name: excerpt, label: "Extracto (resumen corto)", widget: text }
              - name: content
                label: "Secciones del artículo"
                widget: list
                summary: "{{heading}}"
                fields:
                  - { name: heading, label: "Subtítulo de la sección", widget: string }
                  - name: paragraphs
                    label: "Párrafos"
                    widget: list
                    field: { name: paragraph, label: "Párrafo", widget: text }
                  - name: media
                    label: "Fotos, vídeos o reels de esta sección"
                    label_singular: "Elemento multimedia"
                    hint: "Opcional. Añade una foto suelta, un vídeo subido o pega el enlace de un reel de Instagram/TikTok/YouTube Shorts."
                    widget: list
                    required: false
                    summary: "{{fields.type}}"
                    fields:
                      - name: type
                        label: "Tipo de contenido"
                        widget: select
                        default: image
                        options:
                          - { label: "Foto", value: "image" }
                          - { label: "Vídeo subido (mp4)", value: "video" }
                          - { label: "Reel / enlace externo (Instagram, TikTok, YouTube Shorts)", value: "embed" }
                      - name: image
                        label: "Foto"
                        widget: image
                        required: false
                        hint: "Rellena solo si el tipo es 'Foto'."
                      - name: video
                        label: "Archivo de vídeo"
                        widget: file
                        required: false
                        hint: "Rellena solo si el tipo es 'Vídeo subido'. Sube un .mp4 ligero."
                      - name: embed_url
                        label: "Enlace del reel o vídeo"
                        widget: string
                        required: false
                        hint: "Rellena solo si el tipo es 'Reel / enlace externo'. Pega la URL completa (Instagram, TikTok o YouTube)."
                      - name: caption
                        label: "Pie de foto/vídeo"
                        widget: string
                        required: false

  - name: "menu"
    label: "Carta"
    files:
      - name: "menu"
        label: "Platos de la carta"
        file: "content/menu.json"
        format: json
        fields:
          - name: featured
            label: "Platos destacados (carta principal)"
            widget: list
            summary: "{{title}} — {{price}}"
            fields:
              - { name: title, label: "Nombre del plato", widget: string }
              - { name: image, label: "Imagen", widget: image }
              - { name: alt, label: "Texto alternativo de la imagen", widget: string }
              - { name: description, label: "Descripción", widget: text }
              - { name: price, label: "Precio (ej. 8,90 € o Desde 4,50 €)", widget: string }

          - name: extra
            label: "También encontrarás (lista corta de texto)"
            widget: list
            field: { name: line, label: "Línea", widget: string }

  - name: "gallery"
    label: "Galería"
    files:
      - name: "gallery"
        label: "Imágenes de la galería"
        file: "content/gallery.json"
        format: json
        fields:
          - name: images
            label: "Imágenes"
            widget: list
            summary: "{{alt}}"
            fields:
              - { name: src, label: "Imagen", widget: image }
              - { name: alt, label: "Texto alternativo", widget: string } 
